# R\u00E8gles de protection du contenu m\u00E9dical en fran\u00E7ais
locale: fr

banned_expressions:
  # Cat\u00E9gorie: All\u00E9gations de gu\u00E9rison/traitement
  - pattern: "gu(?:e|é)ri(?:t|r|s|e|ssent)\\b"
    category: cure_claim
    severity: danger
    suggestion: "peut aider \u00E0 g\u00E9rer les sympt\u00F4mes"
  - pattern: "(?:compl(?:e|è)tement|totalement|enti(?:e|è)rement) gu(?:e|é)ri"
    category: cure_claim
    severity: danger
    suggestion: "peut soutenir la gu\u00E9rison"
  - pattern: "(?:rem(?:e|è)de|traitement|m(?:e|é)dicament) miracle"
    category: cure_claim
    severity: danger
    suggestion: "option de traitement fond\u00E9e sur des preuves"
  - pattern: "gu(?:e|é)ri(?:son|r) (?:instantan(?:e|é)e?|imm(?:e|é)diate?)"
    category: cure_claim
    severity: danger
    suggestion: "peut progressivement aider \u00E0 am\u00E9liorer"
  - pattern: "garanti(?:e|t)? (?:de |pour )?(?:fonctionner|gu(?:e|é)rir|soigner)"
    category: cure_claim
    severity: danger
    suggestion: "a montr\u00E9 des r\u00E9sultats positifs dans des \u00E9tudes"
  - pattern: "(?:e|é)limine (?:la )?(?:maladie|affection|pathologie)"
    category: cure_claim
    severity: danger
    suggestion: "peut aider \u00E0 g\u00E9rer la maladie"

  # Cat\u00E9gorie: All\u00E9gations de s\u00E9curit\u00E9 absolue
  - pattern: "100% s(?:u|û)r"
    category: absolute_claim
    severity: danger
    suggestion: "g\u00E9n\u00E9ralement bien tol\u00E9r\u00E9"
  - pattern: "(?:compl(?:e|è)tement|parfaitement|totalement|absolument) s(?:u|û)r"
    category: absolute_claim
    severity: danger
    suggestion: "g\u00E9n\u00E9ralement consid\u00E9r\u00E9 comme s\u00FBr lorsqu'il est utilis\u00E9 conform\u00E9ment aux instructions"
  - pattern: "(?:aucun|sans|pas d[e']?) (?:effet[s]? (?:secondaire|ind(?:e|é)sirable)|effet[s]? n(?:e|é)gatif)"
    category: absolute_claim
    severity: danger
    suggestion: "les effets secondaires sont rares mais possibles"
  - pattern: "(?:z(?:e|é)ro|aucun) risque"
    category: absolute_claim
    severity: danger
    suggestion: "faible risque lorsqu'il est utilis\u00E9 conform\u00E9ment aux instructions"
  - pattern: "parfaitement s(?:u|û)r"
    category: absolute_claim
    severity: danger
    suggestion: "g\u00E9n\u00E9ralement bien tol\u00E9r\u00E9 aux doses recommand\u00E9es"

  # Cat\u00E9gorie: Alarmisme / exag\u00E9ration
  - pattern: "(?:vous |il )?(?:allez|pourriez|pouvez|va) (?:mourir|tuer)"
    category: fear_mongering
    severity: danger
    suggestion: "peut pr\u00E9senter des risques graves pour la sant\u00E9"
  - pattern: "mort (?:instantan(?:e|é)e|imm(?:e|é)diate|subite)"
    category: fear_mongering
    severity: danger
    suggestion: "potentiellement mortel dans les cas graves"
  - pattern: "(?:mortellement|fatalement) dangereu(?:x|se)"
    category: fear_mongering
    severity: warning
    suggestion: "potentiellement nocif"
  - pattern: "combinaison (?:mortelle|fatale)"
    category: fear_mongering
    severity: warning
    suggestion: "combinaison potentiellement dangereuse"
  - pattern: "crise cardiaque"
    category: fear_mongering
    severity: caution
    suggestion: "risque cardiovasculaire accru"

  # Cat\u00E9gorie: Anti-professionnel
  - pattern: "(?:mieux|plus pr(?:e|é)cis|plus intelligent) que (?:votre |un )?(?:m(?:e|é)decin|docteur|pharmacien)"
    category: anti_professional
    severity: danger
    suggestion: "peut compl\u00E9ter les conseils m\u00E9dicaux professionnels"
  - pattern: "(?:pas besoin|inutile) (?:de |d')?(?:consulter |voir )?(?:un |votre )?(?:m(?:e|é)decin|docteur|pharmacien)"
    category: anti_professional
    severity: danger
    suggestion: "consultez votre professionnel de sant\u00E9"
  - pattern: "remplace (?:votre |le )?(?:m(?:e|é)decin|docteur|pharmacien)"
    category: anti_professional
    severity: danger
    suggestion: "un compl\u00E9ment aux soins m\u00E9dicaux professionnels"
  - pattern: "(?:les )?(?:m(?:e|é)decins?|docteurs?) (?:ne veulent pas|d(?:e|é)testent|ne (?:vous )?diront pas)"
    category: anti_professional
    severity: danger
    suggestion: "un domaine de recherche m\u00E9dicale en cours"

  # Cat\u00E9gorie: All\u00E9gations de pr\u00E9vention non v\u00E9rifi\u00E9es
  - pattern: "(?:pr(?:e|é)vient|emp(?:e|ê)che|prot(?:e|è)ge (?:du |contre le )) cancer"
    category: prevention_claim
    severity: danger
    suggestion: "certaines \u00E9tudes sugg\u00E8rent un effet protecteur possible"
  - pattern: "(?:pr(?:e|é)vient|emp(?:e|ê)che|prot(?:e|è)ge contre) (?:(?:les )?maladies? cardiaques?|(?:l[ea]' )?(?:AVC|diab(?:e|è)te|Alzheimer|infarctus))"
    category: prevention_claim
    severity: warning
    suggestion: "peut contribuer \u00E0 soutenir la sant\u00E9 cardiovasculaire/m\u00E9tabolique"
  - pattern: "anti-(?:a|â)ge"
    category: prevention_claim
    severity: caution
    suggestion: "peut favoriser un vieillissement en bonne sant\u00E9"

  # Cat\u00E9gorie: Faux t\u00E9moignages
  - pattern: "(?:j'ai (?:e|é)t(?:e|é) |je suis )gu(?:e|é)ri"
    category: fake_testimonial
    severity: warning
    suggestion: "les r\u00E9sultats individuels peuvent varier"
  - pattern: "(?:(?:c|ç)a|cela) (?:a chang(?:e|é)|a sauv(?:e|é)) ma vie"
    category: fake_testimonial
    severity: caution
    suggestion: "certains utilisateurs rapportent des exp\u00E9riences positives"
  - pattern: "tout le monde devrait (?:prendre|utiliser|essayer)"
    category: fake_testimonial
    severity: warning
    suggestion: "peut valoir la peine d'en discuter avec votre professionnel de sant\u00E9"

  # Cat\u00E9gorie: Recommandation directe
  - pattern: "(?:vous )?(?:devez|devriez) (?:prendre|utiliser|essayer) (?:ceci|cela|ce)"
    category: direct_recommendation
    severity: warning
    suggestion: "vous pouvez discuter de cette option avec votre m\u00E9decin"
  - pattern: "(?:prenez|utilisez) (?:ceci|cela) (?:(?:a|à) la place|maintenant|imm(?:e|é)diatement|tout de suite)"
    category: direct_recommendation
    severity: warning
    suggestion: "consultez votre professionnel de sant\u00E9 \u00E0 propos de cette option"

claim_patterns:
  - pattern: "(?:traite|gu(?:e|é)rit|soigne|corrige|inverse) (?:votre )?\\w+"
    severity: warning
  - pattern: "prouv(?:e|é) pour (?:fonctionner|gu(?:e|é)rir|traiter|pr(?:e|é)venir)"
    severity: warning
  - pattern: "cliniquement prouv(?:e|é)"
    severity: caution
  - pattern: "scientifiquement prouv(?:e|é)"
    severity: caution
  - pattern: "(?:ANSM|EMA)[- ]approuv(?:e|é)"
    severity: caution

disclaimer_patterns:
  - "ne (?:se )?substitue pas (?:a|à) un avis m(?:e|é)dical professionnel"
  - "n'est pas destin(?:e|é) (?:a|à) diagnostiquer, traiter, gu(?:e|é)rir ou pr(?:e|é)venir"
  - "consultez votre (?:m(?:e|é)decin|pharmacien|professionnel de sant(?:e|é))"
  - "ne remplace pas (?:l')?avis m(?:e|é)dical (?:professionnel)?"
  - "(?:a|à) titre (?:d'information|informatif) uniquement"

valid_sources:
  - "FDA"
  - "NIH"
  - "WHO"
  - "PubMed"
  - "Mayo Clinic"
  - "MedlinePlus"
  - "DrugBank"
  - "UpToDate"
  - "Cochrane"
  - "peer-reviewed"
  - "EMA"
  - "ANSM"
  - "HAS"
  - "ANSES"
  - "Vidal"
  - "INSERM"
  - "Minist\u00E8re de la Sant\u00E9"
  - "Ordre des pharmaciens"
  - "Ordre des m\u00E9decins"

