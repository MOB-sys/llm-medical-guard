# Regras de prote\u00E7\u00E3o de conte\u00FAdo m\u00E9dico em portugu\u00EAs
locale: pt

banned_expressions:
  # Categoria: Alega\u00E7\u00F5es de cura/tratamento
  - pattern: "cura(?:r|do|da|m|s)?\\b"
    category: cure_claim
    severity: danger
    suggestion: "pode ajudar a gerir os sintomas"
  - pattern: "(?:completamente|totalmente|inteiramente) curad[oa]"
    category: cure_claim
    severity: danger
    suggestion: "pode apoiar a recupera\u00E7\u00E3o"
  - pattern: "(?:rem(?:e|é)dio|cura|tratamento|medicamento) milagros[oa]"
    category: cure_claim
    severity: danger
    suggestion: "op\u00E7\u00E3o de tratamento baseada em evid\u00EAncias"
  - pattern: "cura (?:instant(?:a|â)nea|imediata)"
    category: cure_claim
    severity: danger
    suggestion: "pode ajudar a melhorar gradualmente"
  - pattern: "garantid[oa] (?:para |de )?(?:funcionar|curar|tratar)"
    category: cure_claim
    severity: danger
    suggestion: "mostrou resultados positivos em estudos"
  - pattern: "elimina (?:a )?(?:doen(?:c|ç)a|enfermidade|condi(?:c|ç)(?:a|ã)o)"
    category: cure_claim
    severity: danger
    suggestion: "pode ajudar a gerir a condi\u00E7\u00E3o"

  # Categoria: Alega\u00E7\u00F5es de seguran\u00E7a absoluta
  - pattern: "100% segur[oa]"
    category: absolute_claim
    severity: danger
    suggestion: "geralmente bem tolerado"
  - pattern: "(?:completamente|perfeitamente|totalmente|absolutamente) segur[oa]"
    category: absolute_claim
    severity: danger
    suggestion: "geralmente considerado seguro quando usado conforme indicado"
  - pattern: "(?:sem|nenhum|zero) (?:efeito[s]? (?:colateral|colaterais|secund(?:a|á)rio|advers[oa]))"
    category: absolute_claim
    severity: danger
    suggestion: "efeitos colaterais s\u00E3o incomuns, mas poss\u00EDveis"
  - pattern: "(?:zero|nenhum|sem) risco"
    category: absolute_claim
    severity: danger
    suggestion: "baixo risco quando usado conforme indicado"
  - pattern: "perfeitamente segur[oa]"
    category: absolute_claim
    severity: danger
    suggestion: "geralmente bem tolerado nas doses recomendadas"

  # Categoria: Alarmismo / exagero
  - pattern: "(?:voc(?:e|ê) |isso )?(?:vai|pode|ir(?:a|á)) (?:morrer|matar)"
    category: fear_mongering
    severity: danger
    suggestion: "pode apresentar riscos graves \u00E0 sa\u00FAde"
  - pattern: "morte (?:instant(?:a|â)nea|imediata|s(?:u|ú)bita)"
    category: fear_mongering
    severity: danger
    suggestion: "potencialmente fatal em casos graves"
  - pattern: "fatalmente perigoso"
    category: fear_mongering
    severity: warning
    suggestion: "potencialmente prejudicial"
  - pattern: "combina(?:c|ç)(?:a|ã)o (?:mortal|fatal|letal)"
    category: fear_mongering
    severity: warning
    suggestion: "combina\u00E7\u00E3o potencialmente perigosa"
  - pattern: "(?:ataque card(?:i|í)aco|infarto)"
    category: fear_mongering
    severity: caution
    suggestion: "risco cardiovascular aumentado"

  # Categoria: Anti-profissional
  - pattern: "(?:melhor|mais precis[oa]|mais inteligente) (?:do )?que (?:o seu |um )?(?:m(?:e|é)dico|farmac(?:e|ê)utic[oa])"
    category: anti_professional
    severity: danger
    suggestion: "pode complementar o aconselhamento m\u00E9dico profissional"
  - pattern: "(?:n(?:a|ã)o precisa|sem necessidade) (?:de )?(?:consultar |ir ao )?(?:um |o )?(?:m(?:e|é)dico|farmac(?:e|ê)utic[oa])"
    category: anti_professional
    severity: danger
    suggestion: "consulte o seu profissional de sa\u00FAde"
  - pattern: "substitui (?:o seu |o )?(?:m(?:e|é)dico|farmac(?:e|ê)utic[oa])"
    category: anti_professional
    severity: danger
    suggestion: "um complemento aos cuidados m\u00E9dicos profissionais"
  - pattern: "(?:os )?m(?:e|é)dicos (?:n(?:a|ã)o querem|odeiam|n(?:a|ã)o (?:v(?:a|ã)o )?(?:lhe )?(?:dizer|contar))"
    category: anti_professional
    severity: danger
    suggestion: "uma \u00E1rea de investiga\u00E7\u00E3o m\u00E9dica em curso"

  # Categoria: Alega\u00E7\u00F5es de preven\u00E7\u00E3o n\u00E3o verificadas
  - pattern: "(?:previne|evita|protege contra (?:o )?)?c(?:a|â)ncer"
    category: prevention_claim
    severity: danger
    suggestion: "alguns estudos sugerem um poss\u00EDvel efeito protetor"
  - pattern: "(?:previne|evita|protege contra) (?:doen(?:c|ç)as? card(?:i|í)acas?|(?:AVC|derrame|diabetes|Alzheimer|infarto))"
    category: prevention_claim
    severity: warning
    suggestion: "pode ajudar a apoiar a sa\u00FAde cardiovascular/metab\u00F3lica"
  - pattern: "anti-(?:envelhecimento|idade|aging)"
    category: prevention_claim
    severity: caution
    suggestion: "pode apoiar um envelhecimento saud\u00E1vel"

  # Categoria: Falsos testemunhos
  - pattern: "(?:eu )?(?:fui|fiquei|estou) curad[oa]"
    category: fake_testimonial
    severity: warning
    suggestion: "os resultados individuais podem variar"
  - pattern: "(?:isso |isto )?(?:mudou|salvou) (?:a )?minha vida"
    category: fake_testimonial
    severity: caution
    suggestion: "alguns utilizadores relatam experi\u00EAncias positivas"
  - pattern: "todos? deveriam (?:tomar|usar|experimentar)"
    category: fake_testimonial
    severity: warning
    suggestion: "pode valer a pena discutir com o seu profissional de sa\u00FAde"

  # Categoria: Recomenda\u00E7\u00E3o direta
  - pattern: "(?:voc(?:e|ê) )?(?:deve|precisa|tem que) (?:tomar|usar|experimentar) (?:isto|isso|este)"
    category: direct_recommendation
    severity: warning
    suggestion: "pode discutir esta op\u00E7\u00E3o com o seu m\u00E9dico"
  - pattern: "(?:tome|use) (?:isto|isso) (?:em vez|agora|imediatamente|j(?:a|á))"
    category: direct_recommendation
    severity: warning
    suggestion: "consulte o seu profissional de sa\u00FAde sobre esta op\u00E7\u00E3o"

claim_patterns:
  - pattern: "(?:trata|cura|corrige|elimina|reverte) (?:o seu |a sua )?\\w+"
    severity: warning
  - pattern: "(?:comprovado|provado) (?:para |que )(?:funcionar?|curar?|tratar?|prevenir?)"
    severity: warning
  - pattern: "clinicamente (?:comprovado|testado)"
    severity: caution
  - pattern: "cientificamente (?:comprovado|provado)"
    severity: caution
  - pattern: "(?:ANVISA|EMA)[- ]aprovado"
    severity: caution

disclaimer_patterns:
  - "n(?:a|ã)o substitui (?:o )?(?:aconselhamento|parecer) m(?:e|é)dico profissional"
  - "n(?:a|ã)o se destina a diagnosticar, tratar, curar ou prevenir"
  - "consulte (?:o seu )?(?:m(?:e|é)dico|farmac(?:e|ê)utic[oa]|profissional de sa(?:u|ú)de)"
  - "n(?:a|ã)o substitui (?:o )?(?:julgamento|parecer) m(?:e|é)dico (?:profissional)?"
  - "apenas para fins (?:informativos|de informa(?:c|ç)(?:a|ã)o)"

valid_sources:
  - "FDA"
  - "NIH"
  - "WHO"
  - "PubMed"
  - "Mayo Clinic"
  - "MedlinePlus"
  - "DrugBank"
  - "UpToDate"
  - "Cochrane"
  - "peer-reviewed"
  - "EMA"
  - "ANVISA"
  - "Infarmed"
  - "Fiocruz"
  - "Minist\u00E9rio da Sa\u00FAde"
  - "CFF"
  - "CFM"
  - "Bulario ANVISA"
  - "DGS"
  - "SNS"

