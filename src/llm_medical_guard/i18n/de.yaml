# Deutsche Regeln zur Absicherung medizinischer Inhalte
locale: de

banned_expressions:
  # Kategorie: Heilungs-/Behandlungsversprechen
  - pattern: "(?:heilt|kuriert|geheilt|kuriert)\\b"
    category: cure_claim
    severity: danger
    suggestion: "kann bei der Linderung von Symptomen helfen"
  - pattern: "(?:vollst(?:ae|ä)ndig|komplett|total) (?:heilen|geheilt)"
    category: cure_claim
    severity: danger
    suggestion: "kann die Genesung unterst\u00FCtzen"
  - pattern: "Wunder(?:mittel|heilung|medikament|kur)"
    category: cure_claim
    severity: danger
    suggestion: "evidenzbasierte Behandlungsoption"
  - pattern: "sofort(?:ige?)? (?:Heilung|heilen|geheilt)"
    category: cure_claim
    severity: danger
    suggestion: "kann allm\u00E4hlich zur Verbesserung beitragen"
  - pattern: "garantiert (?:wirkt|heilt|hilft)"
    category: cure_claim
    severity: danger
    suggestion: "hat in Studien positive Ergebnisse gezeigt"
  - pattern: "(?:beseitigt|eliminiert) (?:die )?(?:Krankheit|Erkrankung)"
    category: cure_claim
    severity: danger
    suggestion: "kann bei der Behandlung der Erkrankung helfen"

  # Kategorie: Absolute Sicherheitsaussagen
  - pattern: "100% sicher"
    category: absolute_claim
    severity: danger
    suggestion: "im Allgemeinen gut vertr\u00E4glich"
  - pattern: "(?:vollkommen|absolut|v(?:oe|ö)llig) sicher"
    category: absolute_claim
    severity: danger
    suggestion: "gilt bei bestimmungsgem\u00E4\u00DFer Anwendung als sicher"
  - pattern: "keine Nebenwirkungen"
    category: absolute_claim
    severity: danger
    suggestion: "Nebenwirkungen sind selten, aber m\u00F6glich"
  - pattern: "(?:null|kein(?:erlei)?) Risiko"
    category: absolute_claim
    severity: danger
    suggestion: "geringes Risiko bei bestimmungsgem\u00E4\u00DFer Anwendung"
  - pattern: "perfekt sicher"
    category: absolute_claim
    severity: danger
    suggestion: "im Allgemeinen gut vertr\u00E4glich bei empfohlener Dosierung"

  # Kategorie: Panikmache / \u00DCbertreibung
  - pattern: "(?:Sie |es )?(?:werden|k(?:oe|ö)nnte[ns]?|kann) (?:sterben|t(?:oe|ö)ten)"
    category: fear_mongering
    severity: danger
    suggestion: "kann ernsthafte Gesundheitsrisiken darstellen"
  - pattern: "sofortiger Tod"
    category: fear_mongering
    severity: danger
    suggestion: "in schweren F\u00E4llen potenziell lebensbedrohlich"
  - pattern: "t(?:oe|ö)dlich gef(?:ae|ä)hrlich"
    category: fear_mongering
    severity: warning
    suggestion: "potenziell sch\u00E4dlich"
  - pattern: "t(?:oe|ö)dliche Kombination"
    category: fear_mongering
    severity: warning
    suggestion: "potenziell gef\u00E4hrliche Kombination"
  - pattern: "Herzinfarkt"
    category: fear_mongering
    severity: caution
    suggestion: "erh\u00F6htes kardiovaskul\u00E4res Risiko"

  # Kategorie: Gegen Fachpersonal
  - pattern: "(?:besser|genauer|schlauer) als (?:Ihr |ein )?(?:Arzt|(?:Ae|Ä)rztin|Apotheker(?:in)?)"
    category: anti_professional
    severity: danger
    suggestion: "kann professionelle medizinische Beratung erg\u00E4nzen"
  - pattern: "(?:brauchen|m(?:ue|ü)ssen) (?:keinen|nicht zum) (?:Arzt|(?:Ae|Ä)rztin|Apotheker(?:in)?)"
    category: anti_professional
    severity: danger
    suggestion: "fragen Sie Ihren Arzt oder Apotheker"
  - pattern: "ersetzt (?:Ihren |den )?(?:Arzt|(?:Ae|Ä)rztin|Apotheker(?:in)?)"
    category: anti_professional
    severity: danger
    suggestion: "eine Erg\u00E4nzung zur professionellen medizinischen Betreuung"
  - pattern: "(?:Ae|Ä)rzte (?:wollen|m(?:oe|ö)chten|werden Ihnen) nicht"
    category: anti_professional
    severity: danger
    suggestion: "ein Bereich laufender medizinischer Forschung"

  # Kategorie: Unbelegte Pr\u00E4ventionsaussagen
  - pattern: "(?:verhindert|beugt vor|sch(?:ue|ü)tzt vor) Krebs"
    category: prevention_claim
    severity: danger
    suggestion: "einige Studien deuten auf eine m\u00F6gliche Schutzwirkung hin"
  - pattern: "(?:verhindert|beugt vor|sch(?:ue|ü)tzt vor) (?:Herz(?:krankheit|infarkt)|Schlaganfall|Diabetes|Alzheimer)"
    category: prevention_claim
    severity: warning
    suggestion: "kann die kardiovaskul\u00E4re/metabolische Gesundheit unterst\u00FCtzen"
  - pattern: "Anti-Aging"
    category: prevention_claim
    severity: caution
    suggestion: "kann gesundes Altern unterst\u00FCtzen"

  # Kategorie: Gef\u00E4lschte Erfahrungsberichte
  - pattern: "(?:ich )?(?:wurde|bin) geheilt"
    category: fake_testimonial
    severity: warning
    suggestion: "individuelle Ergebnisse k\u00F6nnen variieren"
  - pattern: "(?:hat|es hat) mein Leben (?:ver(?:ae|ä)ndert|gerettet)"
    category: fake_testimonial
    severity: caution
    suggestion: "einige Anwender berichten von positiven Erfahrungen"
  - pattern: "jeder sollte (?:das|dies) (?:nehmen|verwenden|probieren)"
    category: fake_testimonial
    severity: warning
    suggestion: "kann mit Ihrem Arzt besprochen werden"

  # Kategorie: Direkte Empfehlung
  - pattern: "(?:Sie )?(?:m(?:ue|ü)ssen|sollten) (?:das|dies) (?:nehmen|verwenden|probieren)"
    category: direct_recommendation
    severity: warning
    suggestion: "besprechen Sie diese Option mit Ihrem Arzt"
  - pattern: "(?:nehmen|verwenden) Sie (?:das|dies) (?:stattdessen|jetzt|sofort)"
    category: direct_recommendation
    severity: warning
    suggestion: "fragen Sie Ihren Arzt zu dieser Option"

claim_patterns:
  - pattern: "(?:behandelt|heilt|behebt|beseitigt) (?:Ihre )?\\w+"
    severity: warning
  - pattern: "nachweislich (?:wirksam|heilend|behandelnd)"
    severity: warning
  - pattern: "klinisch (?:erprobt|bewiesen|getestet)"
    severity: caution
  - pattern: "wissenschaftlich (?:erprobt|bewiesen|belegt)"
    severity: caution
  - pattern: "(?:BfArM|EMA)[- ]zugelassen"
    severity: caution

disclaimer_patterns:
  - "kein Ersatz f(?:ue|ü)r professionelle (?:ae|ä)rztliche Beratung"
  - "nicht zur Diagnose, Behandlung, Heilung oder Vorbeugung"
  - "(?:fragen|konsultieren) Sie (?:Ihren )?(?:Arzt|Apotheker|Gesundheitsdienstleister)"
  - "ersetzt nicht (?:die )?(?:professionelle )?(?:ae|ä)rztliche (?:Beratung|Beurteilung)"
  - "dient nur zu Informationszwecken"

valid_sources:
  - "FDA"
  - "NIH"
  - "WHO"
  - "PubMed"
  - "Mayo Clinic"
  - "MedlinePlus"
  - "DrugBank"
  - "UpToDate"
  - "Cochrane"
  - "peer-reviewed"
  - "EMA"
  - "BfArM"
  - "PEI"
  - "ABDA"
  - "RKI"
  - "DIMDI"
  - "Gelbe Liste"
  - "Rote Liste"
  - "Pharmazeutische Zeitung"
  - "Arznei-Telegramm"

